<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Le Cercle des Critiques — Avignon 2026</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎭</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,800;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap');

textarea, input, select { font-family: inherit; }

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

/* ————— Palette & type ————— */
const C = {
  ink: "#221419", paper: "#F7F1E4", red: "#8E1F2F", gold: "#C9A227",
  stone: "#EAE0CC", fog: "#8B7E6C", cream: "#E8DFCE",
};
const serif = "'Playfair Display', Georgia, serif";
const sans = "'Inter', -apple-system, sans-serif";

const SEED_SHOWS = [
  "Dans la peau de Cyrano",
  "Le Portrait de Dorian Gray",
  "L'Empereur des boulevards",
  "Contre-temps",
];

/* ————— Persistance locale : automatique, par téléphone ————— */
const LS_DB = "cercle-critiques-db-v1";
const LS_ME = "cercle-critiques-me-v1";
const LS_ROOM = "cercle-critiques-room-v1";
const lsGet = (k) => { try { return localStorage.getItem(k); } catch { return null; } };
const lsSet = (k, v) => { try { localStorage.setItem(k, v); } catch {} };

const emptyDb = () => ({
  participants: [],
  shows: SEED_SHOWS.map((t, i) => ({ id: `seed${i}`, title: t })),
  reviews: {}, // { nom: { showId: {note, courte, longue, haiku, ts} } }
  votes: {},   // { "v:gameId:idx:nom": {..., ts} }
  game: null,
});
const loadLocalDb = () => {
  try { const d = JSON.parse(lsGet(LS_DB)); return d && typeof d === "object" ? mergeDb(emptyDb(), d) : emptyDb(); }
  catch { return emptyDb(); }
};
const saveLocalDb = (db) => lsSet(LS_DB, JSON.stringify(db));
const clone = (x) => JSON.parse(JSON.stringify(x));

/* ————— Fusion : monotone et sans perte (union + « le plus récent gagne ») ————— */
function mergeDb(a, b) {
  if (!b) return a; if (!a) return b;
  const participants = Array.from(new Set([...(a.participants || []), ...(b.participants || [])].filter((x) => typeof x === "string" && x.trim())));
  const byId = new Map(); const titles = new Set();
  [...(a.shows || []), ...(b.shows || [])].forEach((s) => {
    if (!s || !s.id || !s.title) return;
    const t = s.title.trim().toLowerCase();
    if (!byId.has(s.id) && !titles.has(t)) { byId.set(s.id, s); titles.add(t); }
  });
  const shows = Array.from(byId.values());
  const reviews = {};
  const addRev = (src) => Object.entries(src || {}).forEach(([n, by]) => {
    reviews[n] = reviews[n] || {};
    Object.entries(by || {}).forEach(([sid, r]) => {
      const cur = reviews[n][sid];
      if (!cur || (r?.ts || 0) >= (cur.ts || 0)) reviews[n][sid] = r;
    });
  });
  addRev(a.reviews); addRev(b.reviews);
  const votes = { ...(a.votes || {}) };
  Object.entries(b.votes || {}).forEach(([k, v]) => {
    if (!votes[k] || (v?.ts || 0) >= (votes[k].ts || 0)) votes[k] = v;
  });
  let game = a.game || null;
  if (b.game) {
    if (!game) game = b.game;
    else if (b.game.id === game.id) game = (b.game.seq || 0) >= (game.seq || 0) ? b.game : game;
    else game = (b.game.startedAt || 0) >= (game.startedAt || 0) ? b.game : game;
  }
  return { participants, shows, reviews, votes, game };
}
const dbSig = (db) => JSON.stringify(db);

/* ————— Salon partagé : synchronisation de groupe sans compte ————— */
const CLOUD = "https://jsonblob.com/api/jsonBlob";
async function cloudCreate(db) {
  const r = await fetch(CLOUD, {
    method: "POST",
    headers: { "Content-Type": "application/json", Accept: "application/json" },
    body: JSON.stringify(db),
  });
  if (!r.ok) throw new Error("création refusée");
  const loc = r.headers.get("Location") || r.headers.get("location");
  const id = loc ? loc.split("/").filter(Boolean).pop() : null;
  if (!id) throw new Error("identifiant de salon introuvable");
  return id;
}
async function cloudGet(id) {
  const r = await fetch(`${CLOUD}/${id}`, { headers: { Accept: "application/json" } });
  if (!r.ok) throw new Error("lecture impossible");
  return r.json();
}
async function cloudPut(id, db) {
  const r = await fetch(`${CLOUD}/${id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(db),
  });
  if (!r.ok) throw new Error("écriture impossible");
}
const roomFromHash = () => {
  const m = (window.location.hash || "").match(/[#&]g=([A-Za-z0-9-]+)/);
  return m ? m[1] : null;
};
const groupLink = (roomId) => `${window.location.origin}${window.location.pathname}#g=${roomId}`;

/* ————— Formats de critique & modes de jeu ————— */
const KINDS = {
  courte: { label: "Critique courte" },
  longue: { label: "Critique longue" },
  haiku: { label: "Haïku" },
};
const getText = (r, k) => (r ? r[k] || (k === "longue" ? r.comment : null) || null : null);
const hasAnyText = (r) => !!(r && (r.courte || r.longue || r.haiku || r.comment));
const isComplete = (r) => !!(r && getText(r, "courte") && getText(r, "longue") && getText(r, "haiku"));
const wc = (t) => (t || "").trim().split(/\s+/).filter(Boolean).length;
const shuffle = (arr) => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
};
const fmtNote = (n) => String(n).replace(".", ",");
const ABC = ["A", "B", "C"];

const MODES = {
  author: { title: "Qui a écrit ça ?", desc: "Le spectacle est affiché — devinez seulement la plume. +1 point.", needsKind: true },
  authorshow: { title: "Plume & Spectacle", desc: "Texte et note seuls — devinez l'auteur·e ET le spectacle. Jusqu'à 2 points.", needsKind: true },
  mystnote: { title: "La note mystère", desc: "La plume et le spectacle sont révélés — devinez la note donnée. Exact : 2 pts, au plus près : 1 pt.", needsKind: false },
  faussaire: { title: "Le faussaire", desc: "Trois critiques dont une seule authentique. Démasquez l'originale. +1 point.", needsKind: true },
  pronostic: { title: "Le pronostic du palmarès", desc: "Une seule manche : quel spectacle aura la meilleure moyenne ? Lequel divise le plus ? +1 point par bonne réponse.", needsKind: false },
};

/* ————— Le faussaire : leurres piochés dans les autres critiques ————— */
function makeFakes(card, kind, deck) {
  const real = card[kind];
  const pool = shuffle(deck.filter((c) => c !== card && c[kind] && c[kind] !== real).map((c) => c[kind]));
  const generic = kind === "haiku"
    ? ["Rideau qui se lève —\nquelque chose s'est produit\nje ne sais pas quoi", "Trois heures assis là\nmon voisin dormait très fort\nla scène aussi, peut-être"]
    : ["Une soirée dont on ressort changé, sans savoir encore si c'est en bien.", "Beaucoup d'idées, un peu de théâtre."];
  return [pool[0] || generic[0], pool[1] || generic[1]];
}

/* ————— Petits composants ————— */
function Stars({ value = 0, onChange, size = 28, color = C.gold, hidden }) {
  const star = (i) => {
    const full = value >= i, half = !full && value >= i - 0.5;
    return (
      <span key={i}
        onClick={onChange ? () => onChange(value === i ? i - 0.5 : i) : undefined}
        style={{ position: "relative", display: "inline-block", width: size, height: size, cursor: onChange ? "pointer" : "default", fontSize: size, lineHeight: 1 }}>
        <span style={{ color: "#D8CDB6" }}>{hidden ? "✶" : "★"}</span>
        {!hidden && (full || half) && (
          <span style={{ position: "absolute", left: 0, top: 0, width: half ? "50%" : "100%", overflow: "hidden", color, whiteSpace: "nowrap" }}>★</span>
        )}
      </span>
    );
  };
  return <span style={{ display: "inline-flex", gap: 2 }}>{[1, 2, 3, 4, 5].map(star)}</span>;
}

const Btn = ({ children, onClick, kind = "primary", style = {}, disabled }) => (
  <button onClick={onClick} disabled={disabled}
    style={{
      fontFamily: sans, fontWeight: 600, fontSize: 15, border: "none", borderRadius: 3,
      padding: "13px 20px", cursor: disabled ? "default" : "pointer", opacity: disabled ? 0.45 : 1,
      background: kind === "primary" ? C.red : kind === "gold" ? C.gold : "transparent",
      color: kind === "ghost" ? C.red : kind === "gold" ? C.ink : C.paper,
      boxShadow: kind === "ghost" ? `inset 0 0 0 1.5px ${C.red}` : "none",
      letterSpacing: "0.02em", ...style,
    }}>
    {children}
  </button>
);

const Chip = ({ label, active, onClick, dark, small }) => (
  <button onClick={onClick}
    style={{
      padding: small ? "7px 13px" : "9px 16px", borderRadius: 999, fontWeight: 600, fontSize: small ? 13 : 14, cursor: "pointer",
      border: `1.5px solid ${dark ? C.gold : C.red}`,
      background: active ? (dark ? C.gold : C.red) : "transparent",
      color: active ? (dark ? C.ink : C.paper) : (dark ? C.gold : C.red),
    }}>
    {label}
  </button>
);

const Center = ({ children }) => (
  <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 12 }}>{children}</div>
);
const Masks = () => <div style={{ fontSize: 44 }}>🎭</div>;

const GameShell = ({ children, onBack, backLabel = "← Programme" }) => (
  <div style={{ minHeight: "100vh", background: `radial-gradient(ellipse at 50% -10%, #3A2029 0%, ${C.ink} 60%)`, display: "flex", flexDirection: "column", alignItems: "center", padding: "22px 18px 40px", gap: 16, fontFamily: sans }}>
    {onBack && <button onClick={onBack} style={{ alignSelf: "flex-start", border: "none", background: "none", color: C.fog, fontSize: 14, cursor: "pointer", padding: 0 }}>{backLabel}</button>}
    {children}
  </div>
);

const Card = ({ card, text, kind, hideShow, hideNote, revealed }) => (
  <div style={{ background: C.paper, borderRadius: 5, padding: "26px 22px", maxWidth: 420, width: "100%", boxShadow: "0 10px 40px rgba(0,0,0,0.45)", position: "relative" }}>
    <div style={{ position: "absolute", top: -6, left: 14, fontFamily: serif, fontSize: 64, color: C.red, lineHeight: 1 }}>«</div>
    <p style={{ fontSize: 12, letterSpacing: "0.14em", textTransform: "uppercase", color: C.fog, textAlign: "center", margin: "6px 0 8px" }}>
      {hideShow && !revealed ? "Spectacle mystère 🎪" : card.showTitle}
    </p>
    <div style={{ textAlign: "center", marginBottom: 12 }}>
      <Stars value={card.note} size={20} hidden={hideNote && !revealed} />
      {hideNote && !revealed && <div style={{ fontSize: 11.5, color: C.fog, marginTop: 2 }}>note tenue secrète</div>}
    </div>
    {text && (
      <p style={{ fontFamily: serif, fontStyle: "italic", fontSize: kind === "haiku" ? 18 : 19, lineHeight: 1.55, textAlign: "center", margin: "0 0 14px", color: C.ink, whiteSpace: "pre-line" }}>
        {text}
      </p>
    )}
    <p style={{ textAlign: "center", fontFamily: serif, fontWeight: 700, fontSize: 17, color: C.red, margin: 0, minHeight: 24 }}>
      {card.hideAuthor && !revealed ? "— ✒️ ???" : `— ${card.author}`}
    </p>
  </div>
);

const ModeTag = ({ mode }) => (
  <span style={{ fontSize: 12, letterSpacing: "0.12em", textTransform: "uppercase", color: C.gold, border: `1px solid ${C.gold}`, borderRadius: 999, padding: "4px 12px", textAlign: "center" }}>
    {MODES[mode]?.title || mode}
  </span>
);

const Palmares = ({ stats, bestId, clivId }) => (
  <div style={{ maxWidth: 420, width: "100%", background: C.paper, borderRadius: 5, padding: "18px 16px", boxShadow: "0 10px 40px rgba(0,0,0,0.45)" }}>
    <p style={{ fontFamily: serif, fontWeight: 800, fontSize: 18, textAlign: "center", margin: "0 0 12px", color: C.red }}>Le palmarès du Cercle</p>
    {[...stats].sort((a, b) => b.avg - a.avg).map((s, i) => (
      <div key={s.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, padding: "7px 4px", borderBottom: `1px solid ${C.stone}`, fontSize: 14 }}>
        <span style={{ fontFamily: serif, fontWeight: 600, flex: 1 }}>
          {i + 1}. {s.title} {s.id === bestId ? "🏆" : ""}{s.id === clivId ? "⚡" : ""}
        </span>
        <span style={{ whiteSpace: "nowrap", color: C.fog, fontSize: 12.5 }}>
          {fmtNote(s.avg.toFixed(1))}/5 · écart {fmtNote(s.spread.toFixed(1))}
        </span>
      </div>
    ))}
    <p style={{ fontSize: 11.5, color: C.fog, margin: "10px 0 0", textAlign: "center" }}>🏆 meilleure moyenne · ⚡ le plus clivant</p>
  </div>
);

/* ═════════ App ═════════ */
function App() {
  const [db, setDb] = useState(loadLocalDb);
  const [me, setMe] = useState(() => lsGet(LS_ME));
  const [view, setView] = useState(() => (lsGet(LS_ME) ? "shows" : "name"));
  const [currentShow, setCurrentShow] = useState(null);
  const [gameConfig, setGameConfig] = useState(null);
  const [roomId, setRoomId] = useState(() => roomFromHash() || lsGet(LS_ROOM));
  const [online, setOnline] = useState(null); // null = jamais tenté, true/false ensuite
  const [notice, setNotice] = useState(null);
  const dbRef = useRef(db); dbRef.current = db;
  const dirtyRef = useRef(false);
  const syncingRef = useRef(false);

  /* Toute modification passe par ici : état + sauvegarde locale AUTOMATIQUE + synchro */
  const update = useCallback((fn) => {
    setDb((prev) => {
      const draft = clone(prev);
      const next = fn(draft) || draft;
      saveLocalDb(next);
      dirtyRef.current = true;
      return next;
    });
  }, []);

  /* Mémoriser le salon si le lien en contient un */
  useEffect(() => {
    if (roomId) lsSet(LS_ROOM, roomId);
    const onHash = () => { const h = roomFromHash(); if (h) { setRoomId(h); lsSet(LS_ROOM, h); } };
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, [roomId]);

  /* Boucle de synchronisation : lit le salon, fusionne, republie si besoin */
  const syncOnce = useCallback(async () => {
    if (!roomId || syncingRef.current) return;
    syncingRef.current = true;
    try {
      const remote = await cloudGet(roomId);
      const merged = mergeDb(dbRef.current, remote);
      if (dbSig(merged) !== dbSig(remote)) await cloudPut(roomId, merged);
      if (dbSig(merged) !== dbSig(dbRef.current)) { setDb(merged); }
      saveLocalDb(merged);
      dirtyRef.current = false;
      setOnline(true);
    } catch {
      setOnline(false);
    } finally {
      syncingRef.current = false;
    }
  }, [roomId]);

  const gameLive = db.game && db.game.phase !== "finished" && Date.now() - (db.game.startedAt || 0) < 12 * 3600 * 1000;

  useEffect(() => {
    if (!roomId) return;
    syncOnce();
    const iv = setInterval(syncOnce, gameLive ? 3500 : 10000);
    return () => clearInterval(iv);
  }, [roomId, gameLive, syncOnce]);

  /* Pousser rapidement après une modification locale */
  useEffect(() => {
    if (!roomId) return;
    const iv = setInterval(() => { if (dirtyRef.current) syncOnce(); }, 1200);
    return () => clearInterval(iv);
  }, [roomId, syncOnce]);

  /* Créer le salon automatiquement au premier lancement (sans lien de groupe) */
  const [creatingRoom, setCreatingRoom] = useState(false);
  const createRoom = useCallback(async () => {
    if (roomId || creatingRoom) return;
    setCreatingRoom(true);
    try {
      const id = await cloudCreate(dbRef.current);
      lsSet(LS_ROOM, id);
      setRoomId(id);
      try { window.history.replaceState(null, "", `#g=${id}`); } catch {}
      setOnline(true);
    } catch {
      setOnline(false);
    } finally {
      setCreatingRoom(false);
    }
  }, [roomId, creatingRoom]);
  useEffect(() => { if (!roomId) createRoom(); }, []); // eslint-disable-line

  const chooseMe = (name) => {
    setMe(name);
    lsSet(LS_ME, name);
    if (!db.participants.includes(name)) update((d) => { if (!d.participants.includes(name)) d.participants.push(name); });
    setView("shows");
  };

  const participants = db.participants;
  const shows = db.shows;
  const reviews = db.reviews;

  const buildDeck = useCallback((mode, kind) => {
    const cards = [];
    shows.forEach((s) => participants.forEach((n) => {
      const r = reviews[n]?.[s.id];
      if (!r || !r.note) return;
      const card = {
        showId: s.id, showTitle: s.title, author: n, note: r.note,
        courte: getText(r, "courte"), longue: getText(r, "longue"), haiku: getText(r, "haiku"),
      };
      if (mode === "mystnote") { cards.push(card); return; }
      if (card[kind]) cards.push(card);
    }));
    return shuffle(cards);
  }, [shows, participants, reviews]);

  const showStats = useCallback(() => shows.map((s) => {
    const notes = participants.map((n) => reviews[n]?.[s.id]?.note).filter((x) => typeof x === "number" && x > 0);
    if (!notes.length) return null;
    return { id: s.id, title: s.title, n: notes.length, avg: notes.reduce((a, b) => a + b, 0) / notes.length, spread: Math.max(...notes) - Math.min(...notes) };
  }).filter(Boolean), [shows, participants, reviews]);

  const shared = { db, update, participants, shows, reviews, me, setView, setCurrentShow, buildDeck, showStats, setNotice, roomId, online, createRoom, creatingRoom, syncOnce };

  return (
    <div style={{ minHeight: "100vh", background: C.paper, fontFamily: sans, color: C.ink }}>
      {notice && (
        <div style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 100, background: C.red, color: C.paper, padding: "10px 40px 10px 14px", fontSize: 13, lineHeight: 1.45, boxShadow: "0 2px 10px rgba(0,0,0,0.25)" }}>
          {notice}
          <button onClick={() => setNotice(null)}
            style={{ position: "absolute", right: 6, top: 6, background: "none", border: "none", color: C.paper, fontSize: 17, cursor: "pointer", padding: 4 }}>✕</button>
        </div>
      )}
      {view === "name" && <NameGate {...shared} chooseMe={chooseMe} />}
      {view === "shows" && <ShowList {...shared} />}
      {view === "review" && <ReviewScreen {...shared} show={currentShow} />}
      {view === "lobby" && <Lobby {...shared} setGameConfig={setGameConfig} />}
      {view === "sharedgame" && <SharedGame {...shared} />}
      {view === "localgame" && <LocalGame {...shared} config={gameConfig} />}
      {view === "status" && <StatusScreen {...shared} />}
      {view === "vault" && <VaultScreen {...shared} />}
      {view === "backup" && <BackupScreen {...shared} />}
    </div>
  );
}

/* ————— Identité ————— */
function NameGate({ participants, chooseMe }) {
  const [input, setInput] = useState("");
  return (
    <div style={{ maxWidth: 460, margin: "0 auto", padding: "48px 22px" }}>
      <div style={{ textAlign: "center", marginBottom: 36 }}>
        <Masks />
        <h1 style={{ fontFamily: serif, fontWeight: 800, fontSize: 34, margin: "10px 0 4px", color: C.red }}>Le Cercle des Critiques</h1>
        <p style={{ color: C.fog, fontSize: 14, margin: 0, letterSpacing: "0.14em", textTransform: "uppercase" }}>Avignon · Juillet 2026</p>
      </div>
      <p style={{ fontFamily: serif, fontStyle: "italic", fontSize: 17, textAlign: "center", marginBottom: 28 }}>
        Qui signe ses critiques ce soir ?
      </p>
      {participants.length > 0 && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center", marginBottom: 26 }}>
          {participants.map((n) => <Chip key={n} label={n} onClick={() => chooseMe(n)} />)}
        </div>
      )}
      <div style={{ display: "flex", gap: 8 }}>
        <input value={input} onChange={(e) => setInput(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && input.trim() && chooseMe(input.trim())}
          placeholder="Nouveau nom de plume…"
          style={{ flex: 1, padding: "12px 14px", fontSize: 15, border: `1.5px solid ${C.stone}`, borderRadius: 3, background: "#fff", outline: "none" }} />
        <Btn onClick={() => input.trim() && chooseMe(input.trim())}>Entrer</Btn>
      </div>
    </div>
  );
}

/* ————— Bandeau de synchronisation ————— */
function SyncBar({ roomId, online, createRoom, creatingRoom, setNotice }) {
  const [copied, setCopied] = useState(false);
  const share = async () => {
    const link = groupLink(roomId);
    const text = `🎭 Le Cercle des Critiques — rejoignez notre salon :\n${link}`;
    if (navigator.share) { try { await navigator.share({ text, url: link }); return; } catch {} }
    try { await navigator.clipboard.writeText(link); setCopied(true); setTimeout(() => setCopied(false), 2500); }
    catch { setNotice(`Lien du groupe : ${link}`); }
  };
  if (!roomId) {
    return (
      <div style={{ background: "#fff", border: `1px solid ${C.stone}`, borderRadius: 3, padding: "10px 14px", marginBottom: 14, fontSize: 13, display: "flex", alignItems: "center", gap: 10 }}>
        <span style={{ flex: 1, color: C.fog }}>Salon de groupe pas encore créé — vos données restent enregistrées sur ce téléphone.</span>
        <Btn kind="ghost" onClick={createRoom} disabled={creatingRoom} style={{ padding: "8px 12px", fontSize: 13 }}>
          {creatingRoom ? "Création…" : "Créer"}
        </Btn>
      </div>
    );
  }
  return (
    <div style={{ background: "#fff", border: `1px solid ${C.stone}`, borderRadius: 3, padding: "10px 14px", marginBottom: 14, fontSize: 13, display: "flex", alignItems: "center", gap: 10 }}>
      <span style={{ width: 9, height: 9, borderRadius: 999, background: online === false ? C.red : online ? "#2E7D32" : C.stone, flexShrink: 0 }} />

/* ————— Programme ————— */
function ShowList({ shows, participants, reviews, me, update, setView, setCurrentShow, roomId, online, createRoom, creatingRoom, setNotice }) {
  const [adding, setAdding] = useState("");
  const [armed, setArmed] = useState(null);

  const addShow = () => {
    const title = adding.trim();
    if (!title) return;
    update((d) => { d.shows.push({ id: `s${Date.now()}`, title }); });
    setAdding("");
  };
  const removeShow = (id) => {
    if (armed !== id) { setArmed(id); setTimeout(() => setArmed((a) => (a === id ? null : a)), 3000); return; }
    setArmed(null);
    update((d) => { d.shows = d.shows.filter((s) => s.id !== id); });
  };

  const countFor = (id) => participants.filter((n) => hasAnyText(reviews[n]?.[id])).length;
  const totalReviews = shows.reduce((a, s) => a + countFor(s.id), 0);

  return (
    <div style={{ maxWidth: 520, margin: "0 auto", padding: "26px 18px 100px" }}>
      <h1 style={{ fontFamily: serif, fontWeight: 800, fontSize: 26, color: C.red, margin: "0 0 4px" }}>Le Cercle des Critiques</h1>
      <p style={{ color: C.fog, fontSize: 13, margin: "0 0 14px" }}>
        Signé <strong style={{ color: C.ink }}>{me}</strong> · {participants.length} plume{participants.length > 1 ? "s" : ""} · {totalReviews} critique{totalReviews > 1 ? "s" : ""}
      </p>

      <SyncBar roomId={roomId} online={online} createRoom={createRoom} creatingRoom={creatingRoom} setNotice={setNotice} />

      <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
        <button onClick={() => setView("status")}
          style={{ flex: 1, padding: "10px 8px", fontSize: 13.5, fontWeight: 600, borderRadius: 3, border: `1.5px solid ${C.stone}`, background: "#fff", color: C.ink, cursor: "pointer" }}>
          📊 État des lieux
        </button>
        <button onClick={() => setView("vault")}
          style={{ flex: 1, padding: "10px 8px", fontSize: 13.5, fontWeight: 600, borderRadius: 3, border: `1.5px solid ${C.stone}`, background: "#fff", color: C.ink, cursor: "pointer" }}>
          🗝️ Le Coffre
        </button>
      </div>

      {shows.map((s) => {
        const mine = reviews[me]?.[s.id];
        const n = countFor(s.id);
        const complete = isComplete(mine);
        return (
          <div key={s.id} onClick={() => { setCurrentShow(s); setView("review"); }}
            style={{ background: "#fff", border: `1px solid ${C.stone}`, borderLeft: `4px solid ${complete ? C.gold : hasAnyText(mine) ? "#D8CDB6" : C.stone}`, borderRadius: 3, padding: "14px 16px", marginBottom: 10, cursor: "pointer", display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontFamily: serif, fontWeight: 600, fontSize: 17 }}>{s.title}</div>
              <div style={{ fontSize: 12.5, color: C.fog, marginTop: 3 }}>
                {n}/{participants.length} critiques · {complete ? "votre triptyque est signé ✓" : hasAnyText(mine) ? "critique incomplète (3 formats attendus)" : "à rédiger"}
              </div>
            </div>
            {mine?.note ? <Stars value={mine.note} size={15} /> : null}
            <button onClick={(e) => { e.stopPropagation(); removeShow(s.id); }}
              style={{ border: "none", background: armed === s.id ? C.red : "none", color: armed === s.id ? C.paper : C.stone, fontSize: armed === s.id ? 11 : 16, fontWeight: 700, cursor: "pointer", padding: armed === s.id ? "6px 8px" : 4, borderRadius: 3, whiteSpace: "nowrap" }}>
              {armed === s.id ? "Retirer ?" : "✕"}</button>
          </div>
        );
      })}

      <div style={{ display: "flex", gap: 8, marginTop: 18 }}>
        <input value={adding} onChange={(e) => setAdding(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && addShow()}
          placeholder="Ajouter un spectacle…"
          style={{ flex: 1, padding: "12px 14px", fontSize: 15, border: `1.5px solid ${C.stone}`, borderRadius: 3, background: "#fff", outline: "none" }} />
        <Btn onClick={addShow}>＋</Btn>
      </div>

      <p style={{ textAlign: "center", marginTop: 20 }}>
        <button onClick={() => setView("backup")} style={{ border: "none", background: "none", color: C.fog, fontSize: 12, cursor: "pointer", textDecoration: "underline" }}>
          💾 Sauvegarde de secours
        </button>
      </p>

      <div style={{ position: "fixed", left: 0, right: 0, bottom: 0, padding: "12px 18px 18px", background: `linear-gradient(transparent, ${C.paper} 40%)`, display: "flex", justifyContent: "center" }}>
        <Btn kind="gold" onClick={() => setView("lobby")} style={{ width: "100%", maxWidth: 484, fontSize: 16 }}>

/* ————— Rédiger : le triptyque ————— */
function ReviewScreen({ show, reviews, me, update, setView }) {
  const existing = reviews[me]?.[show.id];
  const [note, setNote] = useState(existing?.note || 0);
  const [courte, setCourte] = useState(existing?.courte || "");
  const [longue, setLongue] = useState(existing?.longue || existing?.comment || "");
  const [haiku, setHaiku] = useState(existing?.haiku || "");

  const longueWc = wc(longue);
  const tooLong = longueWc > 60;
  const ready = note > 0 && courte.trim() && longue.trim() && !tooLong && haiku.trim();

  const save = () => {
    update((d) => {
      d.reviews[me] = d.reviews[me] || {};
      d.reviews[me][show.id] = { note, courte: courte.trim(), longue: longue.trim(), haiku: haiku.trim(), ts: Date.now() };
    });
    setView("shows");
  };

  const label = { fontSize: 12, letterSpacing: "0.12em", textTransform: "uppercase", color: C.red, fontWeight: 700, margin: "0 0 4px" };
  const hint = { fontSize: 12, color: C.fog, margin: "0 0 6px" };
  const area = { width: "100%", padding: 12, fontSize: 15.5, fontFamily: serif, fontStyle: "italic", border: `1.5px solid ${C.stone}`, borderRadius: 3, resize: "vertical", outline: "none", lineHeight: 1.5 };

  return (
    <div style={{ maxWidth: 520, margin: "0 auto", padding: "26px 18px 40px" }}>
      <button onClick={() => setView("shows")} style={{ border: "none", background: "none", color: C.fog, fontSize: 14, cursor: "pointer", padding: 0, marginBottom: 18 }}>← Programme</button>
      <p style={{ color: C.fog, fontSize: 12, letterSpacing: "0.16em", textTransform: "uppercase", margin: "0 0 4px" }}>Votre critique en trois actes</p>
      <h2 style={{ fontFamily: serif, fontWeight: 800, fontSize: 26, margin: "0 0 22px" }}>{show.title}</h2>

      <div style={{ background: "#fff", border: `1px solid ${C.stone}`, borderRadius: 4, padding: 18, display: "flex", flexDirection: "column", gap: 18 }}>
        <div style={{ textAlign: "center" }}>
          <Stars value={note} onChange={setNote} size={36} />
          <div style={{ fontSize: 12.5, color: C.fog, marginTop: 4 }}>
            {note ? `${fmtNote(note)}/5` : "Touchez pour noter"} · retouchez la même étoile pour une demi-note
          </div>
        </div>

        <div>
          <p style={label}>Acte I — Critique courte</p>
          <p style={hint}>Une phrase ou un groupe nominal. Le titre qui claque. Émojis bienvenus 🎭</p>
          <textarea value={courte} onChange={(e) => setCourte(e.target.value)} rows={2}
            placeholder={'« Un uppercut en dentelle. »'} style={area} />
        </div>

        <div>
          <p style={label}>Acte II — Critique longue</p>
          <p style={hint}>Développez, mais 60 mots maximum tout de même.</p>
          <textarea value={longue} onChange={(e) => setLongue(e.target.value)} rows={5}
            placeholder={'« Une mise en scène qui… » — écrivez comme si Télérama vous lisait. Attention : votre style peut vous trahir…'}
            style={{ ...area, borderColor: tooLong ? C.red : C.stone }} />
          <p style={{ fontSize: 12, color: tooLong ? C.red : C.fog, textAlign: "right", margin: "4px 0 0", fontWeight: tooLong ? 700 : 400 }}>
            {longueWc}/60 mots{tooLong ? " — la rédaction exige des coupes !" : ""}
          </p>
        </div>

        <div>
          <p style={label}>Acte III — Haïku</p>
          <p style={hint}>Trois lignes, esprit 5-7-5. La quintessence du spectacle.</p>
          <textarea value={haiku} onChange={(e) => setHaiku(e.target.value)} rows={3}
            placeholder={"Rideau rouge s'ouvre\nquelque chose bascule en moi\nAvignon, juillet"} style={area} />
        </div>
      </div>

      <Btn onClick={save} disabled={!ready} style={{ width: "100%", marginTop: 16, fontSize: 16 }}>
        {existing ? "Mettre à jour ma critique" : "Signer ma critique"}

      <p style={{ fontSize: 12.5, color: C.fog, textAlign: "center", marginTop: 10 }}>
        Enregistrement automatique sur ce téléphone et dans le salon du groupe. Tout reste anonyme jusqu'au soir du jeu.
      </p>
    </div>
  );
}

/* ————— Lobby ————— */
function Lobby({ db, update, buildDeck, participants, shows, me, setView, setGameConfig, showStats, roomId }) {
  const [mode, setMode] = useState("author");
  const [kind, setKind] = useState("courte");
  const [input, setInput] = useState(roomId ? "phones" : "manual");

  const activeGame = db.game && db.game.phase !== "finished" && Date.now() - (db.game.startedAt || 0) < 12 * 3600 * 1000 ? db.game : null;
  const needsKind = MODES[mode].needsKind;
  const stats = showStats();
  const totalCards = mode === "pronostic" ? stats.length : buildDeck(mode, kind).length;
  const canStart = mode === "pronostic" ? stats.length >= 2 : totalCards > 0;

  const start = () => {
    if (input === "manual") {
      setGameConfig({ mode, kind });
      setView("localgame");
      return;
    }
    const deck = mode === "pronostic" ? [{ pronostic: true }] : buildDeck(mode, kind);
    const withOptions = mode === "faussaire"
      ? deck.map((card) => {
          const fakes = makeFakes(card, kind, deck);
          return { ...card, options: shuffle([{ t: card[kind], real: true }, ...fakes.map((t) => ({ t, real: false }))]) };
        })
      : deck;
    update((d) => {
      d.game = {
        id: `g${Date.now()}`, host: me, mode, kind: needsKind ? kind : null,
        deck: withOptions, idx: 0, phase: "voting", scores: {}, lastResult: null,
        startedAt: Date.now(), seq: 1,
        showOptions: shows.map((s) => ({ id: s.id, title: s.title })),
        stats: mode === "pronostic" ? stats : null,
      };
    });
    setView("sharedgame");
  };

  return (
    <GameShell onBack={() => setView("shows")}>
      <Masks />
      <h2 style={{ fontFamily: serif, fontWeight: 800, fontSize: 28, color: C.gold, margin: "4px 0" }}>La soirée du Cercle</h2>

      {activeGame && (
        <div style={{ background: "rgba(255,255,255,0.07)", borderRadius: 5, padding: 18, maxWidth: 380, width: "100%", textAlign: "center" }}>
          <p style={{ color: C.cream, fontSize: 14.5, margin: "0 0 10px" }}>
            Une partie est en cours ({MODES[activeGame.mode]?.title}), animée par <strong style={{ color: C.gold }}>{activeGame.host}</strong>
          </p>
          <div style={{ display: "flex", gap: 8, justifyContent: "center", flexWrap: "wrap" }}>
            <Btn kind="gold" onClick={() => setView("sharedgame")}>
              {activeGame.host === me ? "Reprendre l'animation" : "Rejoindre la partie"}
            </Btn>
            {activeGame.host === me && (
              <Btn kind="ghost" style={{ boxShadow: `inset 0 0 0 1.5px ${C.fog}`, color: C.fog }}
                onClick={() => update((d) => { if (d.game) { d.game.phase = "finished"; d.game.seq = (d.game.seq || 0) + 1; } })}>
                Clôturer
              </Btn>
            )}
          </div>
        </div>
      )}

      <div style={{ maxWidth: 380, width: "100%", display: "flex", flexDirection: "column", gap: 18, marginTop: 6 }}>
        <div>
          <p style={{ color: C.fog, fontSize: 12, letterSpacing: "0.14em", textTransform: "uppercase", margin: "0 0 8px" }}>Mode de jeu</p>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {Object.entries(MODES).map(([k, m]) => (
              <GameOption key={k} active={mode === k} onClick={() => setMode(k)} title={m.title} desc={m.desc} />
            ))}
          </div>
        </div>

        {needsKind && (
          <div>
            <p style={{ color: C.fog, fontSize: 12, letterSpacing: "0.14em", textTransform: "uppercase", margin: "0 0 8px" }}>Format de critique joué</p>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {Object.entries(KINDS).map(([k, v]) => (
                <Chip key={k} dark small label={v.label} active={kind === k} onClick={() => setKind(k)} />
              ))}
            </div>
          </div>
        )}

        <div>
          <p style={{ color: C.fog, fontSize: 12, letterSpacing: "0.14em", textTransform: "uppercase", margin: "0 0 8px" }}>Façon de voter</p>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <GameOption active={input === "phones"} onClick={() => setInput("phones")}
              title="📱 Chacun sur son téléphone" desc={roomId ? "Tout le monde vote en secret via le salon du groupe ; les points tombent tout seuls." : "Nécessite le salon de groupe (voir l'écran Programme)."} />
            <GameOption active={input === "manual"} onClick={() => setInput("manual")}
              title="🙋 À main levée" desc="Un seul téléphone, on devine à voix haute, l'animateur distribue les points." />
          </div>
        </div>

        <p style={{ color: C.gold, fontSize: 14, textAlign: "center", margin: 0 }}>
          {mode === "pronostic"
            ? `${stats.length} spectacle${stats.length > 1 ? "s" : ""} au palmarès${stats.length < 2 ? " — il en faut au moins 2" : ""}`
            : `${totalCards} critique${totalCards > 1 ? "s" : ""} dans le chapeau`}

  );

/* ————— Partie partagée (vote sur téléphones via le salon) ————— */
function SharedGame({ db, update, me, participants, setView, syncOnce }) {
  const game = db.game;
  const [pickAuthor, setPickAuthor] = useState(null);
  const [pickShow, setPickShow] = useState(null);
  const [pickNote, setPickNote] = useState(0);
  const [pickOpt, setPickOpt] = useState(null);
  const [pickBest, setPickBest] = useState(null);
  const [pickCliv, setPickCliv] = useState(null);

  const roundKey = game ? `${game.id}:${game.idx}` : "";
  useEffect(() => { setPickAuthor(null); setPickShow(null); setPickNote(0); setPickOpt(null); setPickBest(null); setPickCliv(null); }, [roundKey]);

  if (!game) return <GameShell onBack={() => setView("shows")}><Masks /><p style={{ color: C.fog }}>Aucune partie en cours.</p></GameShell>;

  const isHost = game.host === me;
  const card = game.deck[game.idx] || {};
  const mode = game.mode;
  const kind = game.kind;
  const iAmAuthor = card.author === me;
  const voteKey = (n, idx = game.idx) => `v:${game.id}:${idx}:${n}`;
  const myVote = db.votes[voteKey(me)] || null;
  const roundVotes = () => {
    const out = {};
    participants.forEach((n) => { const v = db.votes[voteKey(n)]; if (v) out[n] = v; });
    return out;
  };
  const voteCount = Object.keys(roundVotes()).length;

  if (game.phase === "finished" || game.idx >= game.deck.length) {
    const ranking = Object.entries(game.scores || {}).sort((a, b) => b[1] - a[1]);
    return (
      <GameShell onBack={() => setView("shows")}>
        <div style={{ fontSize: 40 }}>🏆</div>
        <h2 style={{ fontFamily: serif, fontWeight: 800, fontSize: 28, color: C.gold }}>Rideau !</h2>
        {ranking.length === 0 && <p style={{ color: C.cream }}>Aucun point — l'honneur est sauf pour tout le monde.</p>}
        {ranking.map(([n, s], i) => (
          <div key={n} style={{ display: "flex", justifyContent: "space-between", width: 280, padding: "10px 16px", background: i === 0 ? C.gold : "rgba(255,255,255,0.08)", color: i === 0 ? C.ink : C.cream, borderRadius: 3, fontWeight: 600 }}>
            <span>{i === 0 ? "👑 " : `${i + 1}. `}{n}</span><span>{s} pt{s > 1 ? "s" : ""}</span>
          </div>
        ))}
      </GameShell>
    );
  }

  const submitVote = () => {
    const vote =
      mode === "mystnote" ? { note: pickNote } :
      mode === "faussaire" ? { opt: pickOpt } :
      mode === "pronostic" ? { best: pickBest, cliv: pickCliv } :
      { author: pickAuthor, showId: mode === "authorshow" ? pickShow : null };
    update((d) => { d.votes[voteKey(me)] = { ...vote, ts: Date.now() }; });
    syncOnce();
  };

  const reveal = () => {
    const votes = roundVotes();
    const scores = { ...(game.scores || {}) };
    const detail = {};

    if (mode === "mystnote") {
      const diffs = Object.entries(votes).filter(([n]) => n !== card.author).map(([n, v]) => [n, Math.abs((v.note || 0) - card.note)]);
      const exact = diffs.some(([, d]) => d === 0);
      const minDiff = diffs.length ? Math.min(...diffs.map(([, d]) => d)) : null;
      Object.entries(votes).forEach(([n, v]) => {
        if (n === card.author) { detail[n] = { isAuthor: true, pts: 0 }; return; }
        const d = Math.abs((v.note || 0) - card.note);
        const pts = d === 0 ? 2 : (!exact && d === minDiff ? 1 : 0);
        if (pts) scores[n] = (scores[n] || 0) + pts;
        detail[n] = { note: v.note, pts };
      });
    } else if (mode === "faussaire") {
      const realIdx = (card.options || []).findIndex((o) => o.real);
      Object.entries(votes).forEach(([n, v]) => {
        if (n === card.author) { detail[n] = { isAuthor: true, pts: 0 }; return; }
        const pts = v.opt === realIdx ? 1 : 0;
        if (pts) scores[n] = (scores[n] || 0) + pts;
        detail[n] = { opt: v.opt, pts };
      });
    } else if (mode === "pronostic") {
      const stats = game.stats || [];
      const bestId = [...stats].sort((a, b) => b.avg - a.avg)[0]?.id;
      const clivId = [...stats].sort((a, b) => b.spread - a.spread)[0]?.id;
      Object.entries(votes).forEach(([n, v]) => {
        const pts = (v.best === bestId ? 1 : 0) + (v.cliv === clivId ? 1 : 0);
        if (pts) scores[n] = (scores[n] || 0) + pts;
        detail[n] = { best: v.best, cliv: v.cliv, pts };
      });
    } else {
      Object.entries(votes).forEach(([n, v]) => {
        if (n === card.author) { detail[n] = { isAuthor: true, pts: 0 }; return; }
        let pts = 0;
        if (v.author === card.author) pts++;
        if (mode === "authorshow" && v.showId === card.showId) pts++;
        if (pts) scores[n] = (scores[n] || 0) + pts;
        detail[n] = { author: v.author, showId: v.showId, pts };
      });
    }

    update((d) => { d.game = { ...d.game, phase: "revealed", scores, lastResult: detail, seq: (d.game.seq || 0) + 1 }; });
    syncOnce();
  };

  const next = () => {
    update((d) => {
      const nIdx = d.game.idx + 1;
      d.game = { ...d.game, idx: nIdx, phase: nIdx >= d.game.deck.length ? "finished" : "voting", lastResult: null, seq: (d.game.seq || 0) + 1 };
    });
    syncOnce();
  };

  const showTitleOf = (id) => game.showOptions.find((s) => s.id === id)?.title || "—";
  const cardText = kind ? card[kind] : null;

  const header = (
    <React.Fragment>
      <ModeTag mode={mode} />
      <p style={{ color: C.fog, fontSize: 13, letterSpacing: "0.14em", textTransform: "uppercase", margin: 0 }}>
        {mode === "pronostic" ? "Manche unique" : `Critique ${game.idx + 1} / ${game.deck.length}`}
      </p>
    </React.Fragment>
  );

  if (game.phase === "voting") {
    return (
      <GameShell onBack={() => setView("shows")} backLabel="← Quitter">
        {header}

        {mode === "pronostic" ? (
          <p style={{ color: C.cream, fontSize: 15, textAlign: "center", maxWidth: 340, fontFamily: serif, fontStyle: "italic" }}>
            Le palmarès est sous scellés. À vous de le pronostiquer…
          </p>
        ) : mode === "mystnote" ? (
          <Card card={{ ...card, hideAuthor: false }} text={null} hideNote revealed={false} />
        ) : mode === "faussaire" ? (
          <p style={{ color: C.cream, fontSize: 14.5, textAlign: "center", maxWidth: 360, margin: 0 }}>
            Trois critiques de <strong style={{ color: C.gold }}>{card.showTitle}</strong> (notée {fmtNote(card.note)}/5) — une seule est authentique.
          </p>
        ) : (
          <Card card={{ ...card, hideAuthor: true }} text={cardText} kind={kind} hideShow={mode === "authorshow"} revealed={false} />
        )}

        {myVote ? (
          <p style={{ color: C.gold, fontSize: 15, textAlign: "center" }}>
            Vote signé ✓<br /><span style={{ color: C.fog, fontSize: 13 }}>En attente de la révélation…</span>
          </p>
        ) : (
          <div style={{ maxWidth: 420, width: "100%", display: "flex", flexDirection: "column", gap: 12 }}>
            {(mode === "author" || mode === "authorshow") && (
              <React.Fragment>
                <p style={{ color: C.cream, fontSize: 13.5, margin: 0, textAlign: "center" }}>Quelle plume se cache ici ?</p>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center" }}>
                  {participants.filter((n) => n !== me).map((n) => (
                    <Chip key={n} dark label={n} active={pickAuthor === n} onClick={() => setPickAuthor(n)} />
                  ))}
                </div>
                {mode === "authorshow" && (
                  <React.Fragment>
                    <p style={{ color: C.cream, fontSize: 13.5, margin: "4px 0 0", textAlign: "center" }}>Et quel spectacle ?</p>
                    <select value={pickShow || ""} onChange={(e) => setPickShow(e.target.value)}
                      style={{ padding: "12px 14px", fontSize: 15, borderRadius: 3, border: `1.5px solid ${C.gold}`, background: "rgba(255,255,255,0.06)", color: C.cream, outline: "none" }}>
                      <option value="" disabled>Choisir un spectacle…</option>
                      {game.showOptions.map((s) => <option key={s.id} value={s.id} style={{ color: C.ink }}>{s.title}</option>)}
                    </select>
                  </React.Fragment>
                )}
              </React.Fragment>
            )}

            {mode === "mystnote" && (
              <div style={{ textAlign: "center" }}>
                <p style={{ color: C.cream, fontSize: 13.5, margin: "0 0 8px" }}>
                  Quelle note <strong style={{ color: C.gold }}>{card.author}</strong> a donnée à ce spectacle ?
                </p>
                <Stars value={pickNote} onChange={setPickNote} size={34} />
                <div style={{ color: C.fog, fontSize: 13, marginTop: 4 }}>{pickNote ? `${fmtNote(pickNote)}/5` : "Touchez pour parier"}</div>
              </div>
            )}

            {mode === "faussaire" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {(card.options || []).map((o, i) => (
                  <div key={i} onClick={() => setPickOpt(i)}
                    style={{ background: pickOpt === i ? "rgba(201,162,39,0.18)" : C.paper, border: `2px solid ${pickOpt === i ? C.gold : "transparent"}`, borderRadius: 5, padding: "14px 16px", cursor: "pointer" }}>
                    <span style={{ fontFamily: serif, fontWeight: 800, color: C.red, marginRight: 8 }}>{ABC[i]}.</span>
                    <span style={{ fontFamily: serif, fontStyle: "italic", fontSize: 15.5, whiteSpace: "pre-line", color: pickOpt === i ? C.cream : C.ink }}>{o.t}</span>
                  </div>
                ))}
              </div>
            )}

            {mode === "pronostic" && (
              <React.Fragment>
                <p style={{ color: C.cream, fontSize: 13.5, margin: 0, textAlign: "center" }}>🏆 Meilleure moyenne du Cercle ?</p>
                <select value={pickBest || ""} onChange={(e) => setPickBest(e.target.value)}
                  style={{ padding: "12px 14px", fontSize: 15, borderRadius: 3, border: `1.5px solid ${C.gold}`, background: "rgba(255,255,255,0.06)", color: C.cream, outline: "none" }}>
                  <option value="" disabled>Choisir…</option>
                  {(game.stats || []).map((s) => <option key={s.id} value={s.id} style={{ color: C.ink }}>{s.title}</option>)}
                </select>
                <p style={{ color: C.cream, fontSize: 13.5, margin: "4px 0 0", textAlign: "center" }}>⚡ Spectacle le plus clivant ?</p>
                <select value={pickCliv || ""} onChange={(e) => setPickCliv(e.target.value)}
                  style={{ padding: "12px 14px", fontSize: 15, borderRadius: 3, border: `1.5px solid ${C.gold}`, background: "rgba(255,255,255,0.06)", color: C.cream, outline: "none" }}>
                  <option value="" disabled>Choisir…</option>
                  {(game.stats || []).map((s) => <option key={s.id} value={s.id} style={{ color: C.ink }}>{s.title}</option>)}
                </select>
              </React.Fragment>
            )}

            <Btn kind="gold" onClick={submitVote} style={{ fontSize: 15.5 }}
              disabled={
                mode === "mystnote" ? !pickNote :
                mode === "faussaire" ? pickOpt === null :
                mode === "pronostic" ? !pickBest || !pickCliv :
                !pickAuthor || (mode === "authorshow" && !pickShow)
              }>
              Sceller mon vote
            </Btn>
            {iAmAuthor && mode !== "pronostic" && (
              <p style={{ color: C.fog, fontSize: 12, textAlign: "center", margin: 0 }}>
                C'est votre critique — votez quand même pour brouiller les pistes, cela ne rapportera rien. 🤫
              </p>
            )}
          </div>
        )}

        {isHost && (
          <div style={{ marginTop: 8, textAlign: "center" }}>
            <p style={{ color: C.gold, fontSize: 14 }}>{voteCount}/{participants.length} votes reçus</p>
            <Btn onClick={reveal} style={{ fontSize: 15.5 }}>Révéler & compter les points</Btn>
          </div>
        )}
      </GameShell>
    );
  }

  /* — Phase révélée — */
  const detail = game.lastResult || {};
  const ranking = Object.entries(game.scores || {}).sort((a, b) => b[1] - a[1]);
  const realIdx = mode === "faussaire" ? (card.options || []).findIndex((o) => o.real) : -1;
  const bestId = mode === "pronostic" ? [...(game.stats || [])].sort((a, b) => b.avg - a.avg)[0]?.id : null;
  const clivId = mode === "pronostic" ? [...(game.stats || [])].sort((a, b) => b.spread - a.spread)[0]?.id : null;

  return (
    <GameShell onBack={() => setView("shows")} backLabel="← Quitter">
      {header}

      {mode === "pronostic" ? (
        <Palmares stats={game.stats || []} bestId={bestId} clivId={clivId} />
      ) : mode === "faussaire" ? (
        <React.Fragment>
          <p style={{ color: C.cream, fontSize: 14, textAlign: "center", margin: 0 }}>
            L'authentique était la <strong style={{ color: C.gold }}>{ABC[realIdx]}</strong>, signée <strong style={{ color: C.gold }}>{card.author}</strong> :
          </p>
          <Card card={{ ...card, hideAuthor: false }} text={card[kind]} kind={kind} revealed />
        </React.Fragment>
      ) : (
        <Card card={{ ...card, hideAuthor: mode === "author" || mode === "authorshow" }}
          text={mode === "mystnote" ? card.courte || card.longue || card.haiku : cardText}
          kind={kind} hideShow={mode === "authorshow"} hideNote={mode === "mystnote"} revealed />
      )}

      <div style={{ maxWidth: 420, width: "100%", background: "rgba(255,255,255,0.06)", borderRadius: 5, padding: 14 }}>
        {participants.map((n) => {
          const d = detail[n];
          let label;
          if (!d) label = "n'a pas voté";
          else if (d.isAuthor) label = "✒️ c'était sa plume !";
          else if (mode === "mystnote") label = `a parié ${fmtNote(d.note)}/5 ${d.pts ? `— +${d.pts}` : "— raté"}`;
          else if (mode === "faussaire") label = `a choisi la ${ABC[d.opt] ?? "?"} ${d.pts ? "— +1" : "— dupé·e 🖋️"}`;
          else if (mode === "pronostic") label = `${showTitleOf(d.best)} · ${showTitleOf(d.cliv)} ${d.pts ? `— +${d.pts}` : "— raté"}`;
          else label = `${d.author}${mode === "authorshow" ? ` · ${showTitleOf(d.showId)}` : ""} ${d.pts ? `— +${d.pts}` : "— raté"}`;
          return (
            <div key={n} style={{ display: "flex", justifyContent: "space-between", gap: 10, padding: "6px 4px", fontSize: 14, color: C.cream, borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
              <span style={{ fontWeight: 600 }}>{n}</span>
              <span style={{ textAlign: "right", color: detail[n]?.pts ? C.gold : C.fog }}>{label}</span>
            </div>
          );
        })}
      </div>

      {ranking.length > 0 && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center", maxWidth: 400 }}>
          {ranking.map(([n, s], i) => (
            <span key={n} style={{ fontSize: 13, fontWeight: 600, color: i === 0 ? C.ink : C.cream, background: i === 0 ? C.gold : "rgba(255,255,255,0.08)", borderRadius: 999, padding: "5px 12px" }}>
              {i === 0 ? "👑 " : ""}{n} · {s}
            </span>
          ))}
        </div>
      )}

      {isHost ? (
        <Btn kind="gold" onClick={next} style={{ fontSize: 15.5 }}>
          {game.idx + 1 >= game.deck.length ? "Voir le palmarès final 🏆" : "Critique suivante →"}
        </Btn>
      ) : (
        <p style={{ color: C.fog, fontSize: 13 }}>L'animateur·rice lancera la suite…</p>
      )}
    </GameShell>
  );
}

/* ————— Partie locale (à main levée) ————— */
function LocalGame({ buildDeck, participants, setView, config, showStats }) {
  const mode = config.mode, kind = config.kind;
  const [deck] = useState(() => {
    if (mode === "pronostic") return [{ pronostic: true }];
    const d = buildDeck(mode, kind);
    return mode === "faussaire"
      ? d.map((card) => {
          const fakes = makeFakes(card, kind, d);
          return { ...card, options: shuffle([{ t: card[kind], real: true }, ...fakes.map((t) => ({ t, real: false }))]) };
        })
      : d;
  });
  const [stats] = useState(() => (mode === "pronostic" ? showStats() : null));
  const [idx, setIdx] = useState(0);
  const [revealed, setRevealed] = useState(false);
  const [scores, setScores] = useState({});
  const [awarded, setAwarded] = useState({});
  const maxPts = mode === "author" || mode === "faussaire" ? 1 : 2;

  const award = (name, pts) => {
    const prev = awarded[name] || 0;
    const nextPts = prev === pts ? 0 : pts;
    setAwarded({ ...awarded, [name]: nextPts });
    setScores((s) => ({ ...s, [name]: (s[name] || 0) - prev + nextPts }));
  };
  const next = () => { setIdx(idx + 1); setRevealed(false); setAwarded({}); };

  if (idx >= deck.length) {
    const ranking = Object.entries(scores).sort((a, b) => b[1] - a[1]);
    return (
      <GameShell onBack={() => setView("shows")}>
        <div style={{ fontSize: 40 }}>🏆</div>
        <h2 style={{ fontFamily: serif, fontWeight: 800, fontSize: 28, color: C.gold }}>Rideau !</h2>
        {ranking.length === 0 && <p style={{ color: C.cream }}>Aucun point — l'honneur est sauf pour tout le monde.</p>}
        {ranking.map(([n, s], i) => (
          <div key={n} style={{ display: "flex", justifyContent: "space-between", width: 280, padding: "10px 16px", background: i === 0 ? C.gold : "rgba(255,255,255,0.08)", color: i === 0 ? C.ink : C.cream, borderRadius: 3, fontWeight: 600 }}>
            <span>{i === 0 ? "👑 " : `${i + 1}. `}{n}</span><span>{s} pt{s > 1 ? "s" : ""}</span>
          </div>
        ))}
        <Btn kind="gold" onClick={() => setView("lobby")} style={{ marginTop: 10 }}>Rejouer</Btn>
      </GameShell>
    );
  }

  const card = deck[idx];
  const realIdx = card.options ? card.options.findIndex((o) => o.real) : -1;
  const bestId = stats ? [...stats].sort((a, b) => b.avg - a.avg)[0]?.id : null;
  const clivId = stats ? [...stats].sort((a, b) => b.spread - a.spread)[0]?.id : null;

  return (
    <GameShell onBack={() => setView("shows")} backLabel="← Quitter">
      <ModeTag mode={mode} />
      <p style={{ color: C.fog, fontSize: 13, letterSpacing: "0.14em", textTransform: "uppercase", margin: 0 }}>
        {mode === "pronostic" ? "Manche unique" : `Critique ${idx + 1} / ${deck.length}`}
      </p>

      {mode === "pronostic" ? (
        revealed
          ? <Palmares stats={stats} bestId={bestId} clivId={clivId} />
          : <p style={{ color: C.cream, fontSize: 15, textAlign: "center", maxWidth: 340, fontFamily: serif, fontStyle: "italic" }}>
              Chacun annonce à voix haute : la meilleure moyenne 🏆 et le plus clivant ⚡…
            </p>
      ) : mode === "mystnote" ? (
        <Card card={{ ...card, hideAuthor: false }} text={revealed ? card.courte : null} hideNote revealed={revealed} />
      ) : mode === "faussaire" ? (
        revealed ? (
          <React.Fragment>
            <p style={{ color: C.cream, fontSize: 14, textAlign: "center", margin: 0 }}>
              L'authentique était la <strong style={{ color: C.gold }}>{ABC[realIdx]}</strong>, signée <strong style={{ color: C.gold }}>{card.author}</strong> :
            </p>
            <Card card={{ ...card, hideAuthor: false }} text={card[kind]} kind={kind} revealed />
          </React.Fragment>
        ) : (
          <React.Fragment>
            <p style={{ color: C.cream, fontSize: 14, textAlign: "center", margin: 0, maxWidth: 360 }}>
              Trois critiques de <strong style={{ color: C.gold }}>{card.showTitle}</strong> ({fmtNote(card.note)}/5) — laquelle est authentique ?
            </p>
            <div style={{ display: "flex", flexDirection: "column", gap: 10, maxWidth: 420, width: "100%" }}>
              {card.options.map((o, i) => (
                <div key={i} style={{ background: C.paper, borderRadius: 5, padding: "14px 16px" }}>
                  <span style={{ fontFamily: serif, fontWeight: 800, color: C.red, marginRight: 8 }}>{ABC[i]}.</span>
                  <span style={{ fontFamily: serif, fontStyle: "italic", fontSize: 15.5, whiteSpace: "pre-line" }}>{o.t}</span>
                </div>
              ))}
            </div>
          </React.Fragment>
        )
      ) : (
        <Card card={{ ...card, hideAuthor: true }} text={card[kind]} kind={kind} hideShow={mode === "authorshow"} revealed={revealed} />
      )}

      {!revealed ? (
        <Btn kind="gold" onClick={() => setRevealed(true)} style={{ fontSize: 16 }}>Révéler</Btn>
      ) : (
        <React.Fragment>
          <p style={{ color: C.cream, fontSize: 13.5, margin: "4px 0 0", textAlign: "center" }}>
            {mode === "mystnote" ? `La note était ${fmtNote(card.note)}/5 — exact : +2, au plus près : +1` :
             mode === "pronostic" ? "Distribuez les points (1 pt par bonne réponse)" :
             maxPts === 2 ? "Distribuez les points (1 pt par bonne réponse, 2 pts pour le sans-faute)" :
             "Distribuez les points (+1 aux bons limiers)"}
          </p>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center", maxWidth: 420 }}>
            {participants.filter((n) => mode === "pronostic" || n !== card.author).map((n) => (
              maxPts === 2 ? (
                <div key={n} style={{ display: "flex", alignItems: "center", gap: 4, background: "rgba(255,255,255,0.06)", borderRadius: 999, padding: "4px 6px 4px 14px" }}>
                  <span style={{ color: C.cream, fontWeight: 600, fontSize: 14 }}>{n}</span>
                  {[1, 2].map((p) => (
                    <button key={p} onClick={() => award(n, p)}
                      style={{ borderRadius: 999, border: `1.5px solid ${C.gold}`, background: (awarded[n] || 0) === p ? C.gold : "transparent", color: (awarded[n] || 0) === p ? C.ink : C.gold, fontWeight: 700, fontSize: 13, padding: "5px 10px", cursor: "pointer" }}>
                      +{p}
                    </button>
                  ))}
                </div>
              ) : (
                <Chip key={n} dark label={n} active={(awarded[n] || 0) === 1} onClick={() => award(n, 1)} />
              )
            ))}
          </div>
          <Btn kind="gold" onClick={next} style={{ fontSize: 16 }}>
            {idx + 1 >= deck.length ? "Palmarès final 🏆" : "Critique suivante →"}
          </Btn>
        </React.Fragment>
      )}

      {Object.keys(scores).length > 0 && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center", maxWidth: 400 }}>
          {Object.entries(scores).sort((a, b) => b[1] - a[1]).map(([n, s], i) => (
            <span key={n} style={{ fontSize: 13, fontWeight: 600, color: i === 0 ? C.ink : C.cream, background: i === 0 ? C.gold : "rgba(255,255,255,0.08)", borderRadius: 999, padding: "5px 12px" }}>
              {i === 0 ? "👑 " : ""}{n} · {s}
            </span>
          ))}
        </div>
      )}
    </GameShell>
  );
}

/* ————— État des lieux ————— */
function StatusScreen({ participants, shows, reviews, setView }) {
  const total = participants.length * shows.length;
  const done = participants.reduce((a, n) => a + shows.filter((s) => hasAnyText(reviews[n]?.[s.id])).length, 0);
  return (
    <div style={{ maxWidth: 520, margin: "0 auto", padding: "26px 18px 40px" }}>
      <button onClick={() => setView("shows")} style={{ border: "none", background: "none", color: C.fog, fontSize: 14, cursor: "pointer", padding: 0, marginBottom: 18 }}>← Programme</button>
      <h2 style={{ fontFamily: serif, fontWeight: 800, fontSize: 26, color: C.red, margin: "0 0 4px" }}>📊 État des lieux</h2>
      <p style={{ color: C.fog, fontSize: 13.5, margin: "0 0 22px" }}>
        Qui a rendu sa copie ? Les textes restent scellés — ici, on ne compte que les copies. {done}/{total} critiques au total.
      </p>

      {participants.map((n) => {
        const count = shows.filter((s) => hasAnyText(reviews[n]?.[s.id])).length;
        const complete = shows.length > 0 && shows.every((s) => isComplete(reviews[n]?.[s.id]));
        return (
          <div key={n} style={{ background: "#fff", border: `1px solid ${C.stone}`, borderLeft: `4px solid ${complete ? C.gold : C.stone}`, borderRadius: 3, padding: "13px 16px", marginBottom: 10 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
              <span style={{ fontFamily: serif, fontWeight: 700, fontSize: 16.5 }}>{n}</span>
              <span style={{ fontWeight: 700, fontSize: 14, color: complete ? C.gold : C.fog }}>
                {count}/{shows.length}{complete ? " ✒️ à jour !" : ""}
              </span>
            </div>
            <div style={{ display: "flex", gap: 4, marginTop: 9, flexWrap: "wrap" }}>
              {shows.map((s) => {
                const r = reviews[n]?.[s.id];
                return (
                  <span key={s.id} title={s.title}
                    style={{ width: 16, height: 16, borderRadius: 2, background: isComplete(r) ? C.gold : hasAnyText(r) ? "#D8CDB6" : C.stone }} />
                );
              })}
            </div>
          </div>
        );
      })}
      <p style={{ color: C.fog, fontSize: 12, textAlign: "center", marginTop: 14 }}>
        Case dorée = triptyque complet · case sable = critique partielle · dans l'ordre du programme.
      </p>
    </div>
  );
}

/* ————— Le Coffre ————— */
function VaultScreen({ participants, shows, reviews, setView }) {
  const [pw, setPw] = useState("");
  const [open, setOpen] = useState(false);
  const [shake, setShake] = useState(false);

  const tryOpen = () => {
    if (pw.trim().toUpperCase() === "ALEYAI") setOpen(true);
    else { setShake(true); setTimeout(() => setShake(false), 500); }
  };

  if (!open) {
    return (
      <div style={{ maxWidth: 460, margin: "0 auto", padding: "26px 18px 40px" }}>
        <button onClick={() => setView("shows")} style={{ border: "none", background: "none", color: C.fog, fontSize: 14, cursor: "pointer", padding: 0, marginBottom: 18 }}>← Programme</button>
        <div style={{ textAlign: "center", marginTop: 30 }}>
          <div style={{ fontSize: 46 }}>🗝️</div>
          <h2 style={{ fontFamily: serif, fontWeight: 800, fontSize: 26, color: C.red, margin: "10px 0 6px" }}>Le Coffre aux critiques</h2>
          <p style={{ color: C.fog, fontSize: 14, lineHeight: 1.55, maxWidth: 320, margin: "0 auto 24px" }}>
            Derrière cette porte : toutes les critiques, signées. À n'ouvrir qu'après la soirée — le mot de passe lève l'anonymat pour de bon.
          </p>
          <div style={{ display: "flex", gap: 8, maxWidth: 340, margin: "0 auto", transform: shake ? "translateX(-6px)" : "none", transition: "transform .1s" }}>
            <input type="password" value={pw} onChange={(e) => setPw(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && tryOpen()}
              placeholder="Mot de passe…"
              style={{ flex: 1, padding: "12px 14px", fontSize: 15, border: `1.5px solid ${shake ? C.red : C.stone}`, borderRadius: 3, background: "#fff", outline: "none", textAlign: "center", letterSpacing: "0.2em" }} />
            <Btn onClick={tryOpen}>Ouvrir</Btn>
          </div>
          {shake && <p style={{ color: C.red, fontSize: 13, marginTop: 10 }}>Le sceau résiste… ce n'est pas le bon mot.</p>}
        </div>
      </div>
    );
  }

  return (
    <div style={{ maxWidth: 520, margin: "0 auto", padding: "26px 18px 50px" }}>
      <button onClick={() => setView("shows")} style={{ border: "none", background: "none", color: C.fog, fontSize: 14, cursor: "pointer", padding: 0, marginBottom: 18 }}>← Programme</button>
      <h2 style={{ fontFamily: serif, fontWeight: 800, fontSize: 26, color: C.red, margin: "0 0 4px" }}>🗝️ Anonymat levé</h2>
      <p style={{ color: C.fog, fontSize: 13.5, margin: "0 0 24px" }}>Toutes les critiques du Cercle, spectacle par spectacle.</p>

      {shows.map((s) => {
        const crits = participants
          .map((n) => ({ author: n, r: reviews[n]?.[s.id] }))
          .filter((c) => hasAnyText(c.r));
        if (!crits.length) return null;
        const notes = crits.map((c) => c.r.note).filter((x) => x > 0);
        const avg = notes.length ? notes.reduce((a, b) => a + b, 0) / notes.length : null;
        return (
          <div key={s.id} style={{ marginBottom: 30 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", borderBottom: `2px solid ${C.red}`, paddingBottom: 6, marginBottom: 12 }}>
              <h3 style={{ fontFamily: serif, fontWeight: 800, fontSize: 19, margin: 0 }}>{s.title}</h3>
              {avg !== null && <span style={{ fontSize: 12.5, color: C.fog, whiteSpace: "nowrap" }}>moy. {fmtNote(avg.toFixed(1))}/5</span>}
            </div>
            {crits.map(({ author, r }) => (
              <div key={author} style={{ background: "#fff", border: `1px solid ${C.stone}`, borderRadius: 3, padding: "13px 16px", marginBottom: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 7 }}>
                  <span style={{ fontFamily: serif, fontWeight: 700, fontSize: 15, color: C.red }}>— {author}</span>
                  {r.note > 0 && <Stars value={r.note} size={14} />}
                </div>
                {getText(r, "courte") && <p style={{ fontFamily: serif, fontWeight: 700, fontSize: 15.5, margin: "0 0 6px" }}>{getText(r, "courte")}</p>}
                {getText(r, "longue") && <p style={{ fontFamily: serif, fontStyle: "italic", fontSize: 15, lineHeight: 1.55, margin: "0 0 6px" }}>{getText(r, "longue")}</p>}
                {getText(r, "haiku") && <p style={{ fontFamily: serif, fontSize: 14, lineHeight: 1.6, margin: 0, whiteSpace: "pre-line", color: C.fog }}>{getText(r, "haiku")}</p>}
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

/* ————— Sauvegarde de secours (copier-coller, rarement nécessaire) ————— */
function BackupScreen({ db, update, me, setView, setNotice }) {
  const [importText, setImportText] = useState("");
  const [result, setResult] = useState(null);
  const [copied, setCopied] = useState(false);

  const exportBlob = JSON.stringify({ v: 1, participants: db.participants, shows: db.shows, reviews: db.reviews });
  const shareText = `🎭 Le Cercle des Critiques — code de ${me || "?"} :\n\n${exportBlob}`;

  const copyExport = async () => {
    try { await navigator.clipboard.writeText(shareText); setCopied(true); setTimeout(() => setCopied(false), 2500); }
    catch { setNotice("Copie impossible — dépliez le code brut et copiez-le à la main."); }
  };
  const shareExport = async () => {
    if (navigator.share) { try { await navigator.share({ text: shareText }); return; } catch {} }
    copyExport();
  };
  const pasteImport = async () => {
    try { const t = await navigator.clipboard.readText(); if (t) setImportText(t); } catch {}
  };

  const extractBlocks = (text) => {
    const blocks = [];
    let depth = 0, start = -1, inStr = false, esc = false;
    for (let i = 0; i < text.length; i++) {
      const ch = text[i];
      if (inStr) {
        if (esc) esc = false;
        else if (ch === "\\") esc = true;
        else if (ch === '"') inStr = false;
        continue;
      }
      if (ch === '"' && depth > 0) { inStr = true; continue; }
      if (ch === "{") { if (depth === 0) start = i; depth++; }
      else if (ch === "}") {
        if (depth > 0) { depth--; if (depth === 0 && start >= 0) { blocks.push(text.slice(start, i + 1)); start = -1; } }
      }
    }
    return blocks;
  };

  const doImport = () => {
    const blocks = extractBlocks(importText);
    let merged = clone(db);
    let nCodes = 0;
    blocks.forEach((b) => {
      let d;
      try { d = JSON.parse(b); } catch { return; }
      if (!d || typeof d !== "object" || (!d.participants && !d.reviews && !d.shows)) return;
      nCodes++;
      merged = mergeDb(merged, { participants: d.participants || [], shows: d.shows || [], reviews: d.reviews || {}, votes: {}, game: null });
    });
    if (!nCodes) { setResult({ ok: false, msg: "Aucun code reconnu dans ce texte." }); return; }
    update(() => merged);
    setResult({ ok: true, msg: `${nCodes} code${nCodes > 1 ? "s" : ""} fusionné${nCodes > 1 ? "s" : ""}.` });
    setImportText("");
  };

  const box = { width: "100%", padding: 12, fontSize: 12, fontFamily: "monospace", border: `1.5px solid ${C.stone}`, borderRadius: 3, resize: "vertical", outline: "none", background: "#fff", lineHeight: 1.4, wordBreak: "break-all" };

  return (
    <div style={{ maxWidth: 520, margin: "0 auto", padding: "26px 18px 50px" }}>
      <button onClick={() => setView("shows")} style={{ border: "none", background: "none", color: C.fog, fontSize: 14, cursor: "pointer", padding: 0, marginBottom: 18 }}>← Programme</button>
      <h2 style={{ fontFamily: serif, fontWeight: 800, fontSize: 24, color: C.red, margin: "0 0 6px" }}>💾 Sauvegarde de secours</h2>
      <p style={{ color: C.fog, fontSize: 13.5, lineHeight: 1.55, margin: "0 0 22px" }}>
        Normalement inutile : tout s'enregistre déjà tout seul. À utiliser seulement pour transférer des données si le salon de groupe est injoignable.
      </p>

      <div style={{ display: "flex", gap: 8 }}>
        <Btn onClick={shareExport} style={{ flex: 2 }}>📤 Partager…</Btn>
        <Btn kind="ghost" onClick={copyExport} style={{ flex: 1 }}>{copied ? "Copié ✓" : "📋 Copier"}</Btn>
      </div>
      <details style={{ marginTop: 10 }}>
        <summary style={{ fontSize: 12.5, color: C.fog, cursor: "pointer" }}>Voir le code brut</summary>
        <textarea readOnly value={exportBlob} rows={4} style={{ ...box, marginTop: 8 }} onClick={(e) => e.target.select()} />
      </details>

      <div style={{ borderTop: `1.5px solid ${C.stone}`, margin: "26px 0" }} />

      <textarea value={importText} onChange={(e) => setImportText(e.target.value)} rows={4}
        placeholder="Collez un ou plusieurs codes reçus (même toute une conversation WhatsApp)…" style={box} />
      <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
        <Btn kind="ghost" onClick={pasteImport} style={{ flex: 1 }}>📋 Coller</Btn>
        <Btn onClick={doImport} disabled={!importText.trim()} style={{ flex: 2 }}>Fusionner</Btn>
      </div>
      {result && (
        <p style={{ fontSize: 13.5, fontWeight: 600, color: result.ok ? "#2E7D32" : C.red, marginTop: 10 }}>
          {result.ok ? "✓ " : "✗ "}{result.msg}
        </p>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
